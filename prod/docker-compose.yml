services:
  pz:
    image: jthomastek/project-zomboid-server:1.0.0
    container_name: pz-prod
    restart: unless-stopped
    stop_grace_period: 1m
    env_file:
      - .env
      - .env.secrets
    ports:
      - "${HOST_GAME_PORT}:8766/udp"
      - "${HOST_PLAYER_PORT_RANGE}:16261-16262/udp"
    volumes:
      - pz_prod_data:/home/ubuntu

volumes:
  pz_prod_data:
    name: pz_prod_data
