services:
  config-sync:
    image: alpine:3
    container_name: pz-prod-config-sync
    volumes:
      - ./config:/src:ro
      - pz_prod_data:/dest
    entrypoint:
      - sh
      - -c
      - "mkdir -p /dest/Zomboid/Server && cp -a /src/. /dest/Zomboid/Server/ && chown -R 1000:1000 /dest"
      # 1000:1000 is the jthomastek/project-zomboid-server image's "ubuntu" user;
      # without this it can't write its own save/log/backup data after config-sync runs as root.

  pz:
    image: jthomastek/project-zomboid-server:1.0.0
    container_name: pz-prod
    restart: unless-stopped
    stop_grace_period: 1m
    depends_on:
      config-sync:
        condition: service_completed_successfully
    env_file:
      - .env
      - .env.secrets
    ports:
      - "${HOST_GAME_PORT}:8766/udp"
      - "${HOST_PLAYER_PORT_RANGE}:16261-16262/udp"
    volumes:
      - pz_prod_data:/home/ubuntu

volumes:
  pz_prod_data:
    name: pz_prod_data
