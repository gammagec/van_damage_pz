services:
  config-sync:
    image: alpine:3
    container_name: pz-testing-config-sync
    volumes:
      - ./config:/src:ro
      - pz_testing_data:/dest
    entrypoint:
      - sh
      - -c
      - "mkdir -p /dest/Zomboid/Server && cp -a /src/. /dest/Zomboid/Server/ && chown -R 1000:1000 /dest"
      # 1000:1000 is the jthomastek/project-zomboid-server image's "ubuntu" user;
      # without this it can't write its own save/log/backup data after config-sync runs as root.

  pz:
    image: jthomastek/project-zomboid-server:latest
    container_name: pz-testing
    restart: unless-stopped
    stop_grace_period: 1m
    command: ["bash", "/scripts/pz-bootstrap.sh"]
    depends_on:
      config-sync:
        condition: service_completed_successfully
    env_file:
      - .env
      - .env.secrets
    ports:
      - "${HOST_GAME_PORT}:8766/udp"
      - "${HOST_PLAYER_PORT_RANGE}:16261-16262/udp"
    volumes:
      - pz_testing_data:/home/ubuntu
      - ../scripts/pz-bootstrap.sh:/scripts/pz-bootstrap.sh:ro

  mod-watcher:
    image: python:3.12-alpine
    container_name: pz-testing-mod-watcher
    environment:
      PZ_CONTAINER: pz-testing
      # POLL_INTERVAL: "900"      # seconds between Steam API checks (default 15 min)
      # RESTART_COOLDOWN: "1200"  # seconds to wait after restart   (default 20 min)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../scripts/mod-update-watcher.py:/watcher.py:ro
      - ./mods.yaml:/mods.yaml:ro
    command: python /watcher.py
    restart: unless-stopped

  scheduler:
    image: docker:cli
    container_name: pz-testing-scheduler
    # Runs crond inside Alpine and restarts the pz container at 01:00 UTC daily.
    # To use a different timezone set TZ (e.g. TZ: America/New_York).
    entrypoint: ["sh", "-c", "echo '0 1 * * * docker restart pz-testing' | crontab - && crond -f -l 2"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  pz_testing_data:
    name: pz_testing_data
