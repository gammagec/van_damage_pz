services:
  config-sync:
    image: alpine:3
    container_name: pz-testing-config-sync
    volumes:
      - ./config:/src:ro
      - pz_testing_data:/dest
    entrypoint:
      - sh
      - -c
      - "mkdir -p /dest/Zomboid/Server && cp -a /src/. /dest/Zomboid/Server/"

  pz:
    image: jthomastek/project-zomboid-server:latest
    container_name: pz-testing
    restart: unless-stopped
    stop_grace_period: 1m
    depends_on:
      config-sync:
        condition: service_completed_successfully
    env_file:
      - .env
      - .env.secrets
    ports:
      - "${HOST_GAME_PORT}:8766/udp"
      - "${HOST_PLAYER_PORT_RANGE}:16261-16262/udp"
    volumes:
      - pz_testing_data:/home/ubuntu

volumes:
  pz_testing_data:
    name: pz_testing_data
