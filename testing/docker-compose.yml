services:
  config-sync:
    image: alpine:3
    container_name: pz-testing-config-sync
    volumes:
      - ./config:/src:ro
      - pz_testing_data:/dest
    entrypoint:
      - sh
      - -c
      - "mkdir -p /dest/Zomboid/Server && cp -a /src/. /dest/Zomboid/Server/ && chown -R 1000:1000 /dest"
      # 1000:1000 is the jthomastek/project-zomboid-server image's "ubuntu" user;
      # without this it can't write its own save/log/backup data after config-sync runs as root.

  pz:
    image: jthomastek/project-zomboid-server:latest
    container_name: pz-testing
    restart: unless-stopped
    stop_grace_period: 1m
    command: ["bash", "/scripts/pz-bootstrap.sh"]
    depends_on:
      config-sync:
        condition: service_completed_successfully
    env_file:
      - .env
      - .env.secrets
    ports:
      - "${HOST_GAME_PORT}:8766/udp"
      - "${HOST_PLAYER_PORT_RANGE}:16261-16262/udp"
    volumes:
      - pz_testing_data:/home/ubuntu
      - ../scripts/pz-bootstrap.sh:/scripts/pz-bootstrap.sh:ro

  mod-watcher:
    image: python:3.12-alpine
    container_name: pz-testing-mod-watcher
    env_file:
      - .env.secrets
    environment:
      PZ_CONTAINER: pz-testing
      RCON_HOST: pz-testing
      MODS_YAML: /mods.yaml
      # POLL_INTERVAL: "900"      # seconds between Steam API checks (default 15 min)
      # RESTART_COOLDOWN: "1200"  # seconds to wait after restart   (default 20 min)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../scripts:/scripts:ro
      - ./mods.yaml:/mods.yaml:ro
    command: python /scripts/mod-update-watcher.py
    restart: unless-stopped

  scheduler:
    image: python:3.12-alpine
    container_name: pz-testing-scheduler
    env_file:
      - .env.secrets
    environment:
      TZ: America/Los_Angeles
      PZ_CONTAINER: pz-testing
      RCON_HOST: pz-testing
    # Sends a 5-min and 1-min in-game warning, saves, then restarts at 01:00 LA time.
    entrypoint: ["sh", "-c", "echo '0 1 * * * python /scripts/restart-with-warning.py' | crontab - && crond -f -l 2"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../scripts:/scripts:ro
    restart: unless-stopped

  metrics-collector:
    image: python:3.12-alpine
    container_name: pz-testing-metrics
    # Run as the host user (uid 1001) so ./metrics and its DB stay host-owned
    # and readable/writable by scripts/metrics-report.py. group_add 973 is the
    # host "docker" group, needed to read the Docker socket for container stats.
    user: "1001:1001"
    group_add:
      - "973"
    env_file:
      - .env.secrets            # provides PZ_RCON_PASSWORD
    environment:
      PZ_CONTAINER: pz-testing
      RCON_HOST: pz-testing
      SQLITE_PATH: /data/metrics.db
      # POLL_INTERVAL: "60"     # seconds between samples (default 60)
    # Polls RCON for logged-in players + reads container stats from the Docker
    # socket, writing samples to ./metrics/metrics.db on the host.
    command: python /scripts/metrics-collector.py
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../scripts:/scripts:ro
      - ./metrics:/data
    restart: unless-stopped

volumes:
  pz_testing_data:
    name: pz_testing_data
